name: qr_code_app
description: study project QR app

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  http: ^1.6.0
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  qr_flutter: ^4.0.0
  firebase_core: ^2.24.2
  url_launcher: ^6.3.0
  mobile_scanner: ^5.0.0
  image_picker: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_native_splash: ^2.4.1
  gal: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.9.0
  table_calendar: ^3.1.0
  pdf: ^3.11.0
  printing: ^5.13.2
  intl: ^0.19.0
  excel: ^4.0.6
  open_filex: ^4.7.0
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^6.0.0
  file_picker: ^8.1.2
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app/launcher_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app/launcher_icon.png
  android: true
  ios: true
  android_12:
    image: assets/icons/app/launcher_icon.png
    color: "#FFFFFF"


flutter:

  uses-material-design: true


  assets:
    - assets/
    - assets/icons/home_p/
    - assets/icons/profile/
    - assets/QR_layout/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

